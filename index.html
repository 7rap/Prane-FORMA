<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Форма за пране</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 40px;
      max-width: 560px;
      width: 100%;
    }
    h1 { font-size: 1.7rem; color: #1a3c5e; margin-bottom: 6px; }
    .subtitle { color: #6b7a8d; margin-bottom: 28px; font-size: 0.95rem; }
    label.block { display: block; font-weight: 600; color: #1a3c5e; margin-bottom: 8px; font-size: 0.95rem; }
    .field { margin-bottom: 22px; }
    input[type="text"], input[type="tel"], input[type="number"], select {
      width: 100%; padding: 11px 14px; border: 1.5px solid #d1d9e0;
      border-radius: 8px; font-size: 1rem; color: #1a3c5e;
      transition: border-color 0.2s;
      background: #f8fafc;
    }
    input:focus, select:focus { border-color: #3b82f6; outline: none; background: #fff; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .checkbox-group label {
      display: flex; align-items: center; gap: 8px;
      background: #f0f4f8; border: 1.5px solid #d1d9e0;
      border-radius: 8px; padding: 10px 16px;
      cursor: pointer; font-size: 0.95rem; color: #1a3c5e;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .checkbox-group input[type="checkbox"] { accent-color: #3b82f6; width: 17px; height: 17px; }
    .checkbox-group label:has(input:checked) { border-color: #3b82f6; background: #eff6ff; }
    .info-box {
      background: #eff6ff; border: 1.5px solid #bfdbfe;
      border-radius: 8px; padding: 12px 16px;
      font-size: 0.9rem; color: #1d4ed8; margin-bottom: 22px;
    }
    .info-box span { font-weight: 700; }
    .slot-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .slot {
      padding: 10px 0; text-align: center; border-radius: 8px;
      border: 1.5px solid #d1d9e0; font-size: 0.88rem;
      cursor: pointer; color: #1a3c5e; background: #f8fafc;
      transition: all 0.15s;
    }
    .slot:hover:not(.taken) { border-color: #3b82f6; background: #eff6ff; }
    .slot.selected { border-color: #3b82f6; background: #3b82f6; color: #fff; font-weight: 600; }
    .slot.taken { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; cursor: not-allowed; text-decoration: line-through; }
    .note { font-size: 0.82rem; color: #6b7a8d; margin-top: 6px; }
    .taken-label { font-size: 0.75rem; display: block; }
    button[type="submit"] {
      width: 100%; padding: 14px; background: #3b82f6; color: #fff;
      border: none; border-radius: 10px; font-size: 1.05rem;
      font-weight: 700; cursor: pointer; margin-top: 8px;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #2563eb; }
    .success {
      display: none; text-align: center; padding: 28px;
      background: #f0fdf4; border: 1.5px solid #86efac;
      border-radius: 12px; color: #166534;
    }
    .success h2 { font-size: 1.4rem; margin-bottom: 8px; }
    /* Admin panel */
    .admin-toggle {
      margin-top: 32px; font-size: 0.82rem; color: #9ca3af;
      cursor: pointer; text-align: center; text-decoration: underline;
    }
    #admin-panel {
      display: none; margin-top: 16px; background: #fff;
      border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 28px 32px; max-width: 560px; width: 100%;
    }
    #admin-panel h2 { color: #1a3c5e; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { background: #f0f4f8; padding: 8px 10px; text-align: left; color: #6b7a8d; }
    td { padding: 8px 10px; border-bottom: 1px solid #f0f4f8; color: #1a3c5e; }
    .btn-export {
      margin-top: 14px; padding: 9px 20px; background: #1a3c5e;
      color: #fff; border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.88rem; font-weight: 600;
    }
    .btn-clear {
      margin-top: 14px; margin-left: 10px; padding: 9px 20px;
      background: #ef4444; color: #fff; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.88rem; font-weight: 600;
    }
    .settings-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .settings-row label { font-size: 0.9rem; color: #1a3c5e; font-weight: 600; }
    .settings-row input { width: 80px; }
    .settings-row small { color: #6b7a8d; font-size: 0.8rem; }
  </style>
</head>
<body>

<div class="card">
  <h1>🧺 Форма за пране</h1>
  <p class="subtitle">Попълнете данните, за да резервирате вашия час</p>

  <form id="laundry-form">

    <!-- Имe -->
    <div class="field">
      <label class="block" for="name">Вашето име *</label>
      <input type="text" id="name" placeholder="Иван Петров" required />
    </div>

    <!-- Телефон -->
    <div class="field">
      <label class="block" for="phone">Телефон *</label>
      <input type="tel" id="phone" placeholder="+359 88 888 8888" required />
    </div>

    <!-- Услуги -->
    <div class="field">
      <label class="block">Какви услуги желаете? *</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="service" value="Пране" checked /> 🫧 Пране</label>
        <label><input type="checkbox" name="service" value="Сушене" /> 🌬️ Сушене</label>
        <label><input type="checkbox" name="service" value="Сгъване" /> 👕 Сгъване</label>
        <label><input type="checkbox" name="service" value="Гладене" /> 🔥 Гладене (по желание)</label>
      </div>
    </div>

    <!-- Тегло -->
    <div class="field">
      <label class="block" for="weight">Приблизително тегло (кг) *</label>
      <input type="number" id="weight" min="1" max="30" step="0.5" placeholder="напр. 5" required />
    </div>

    <!-- Авт. изчисление -->
    <div class="info-box" id="estimate-box" style="display:none">
      ⏱️ Очаквано време: <span id="est-time">—</span> &nbsp;|&nbsp;
      💰 Цена: <span id="est-price">—</span>
    </div>

    <!-- Час -->
    <div class="field">
      <label class="block">Изберете час *</label>
      <div class="slot-grid" id="slot-grid"></div>
      <input type="hidden" id="chosen-slot" required />
      <p class="note">Заетите часове са маркирани в червено.</p>
    </div>

    <!-- Бележки -->
    <div class="field">
      <label class="block" for="notes">Допълнителни бележки</label>
      <input type="text" id="notes" placeholder="напр. алергия към определен препарат..." />
    </div>

    <button type="submit">✅ Изпрати резервацията</button>
  </form>

  <div class="success" id="success-msg">
    <h2>🎉 Резервацията е приета!</h2>
    <p id="success-detail"></p>
    <br/>
    <button onclick="resetForm()" style="padding:10px 24px;background:#16a34a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700">Нова резервация</button>
  </div>
</div>

<p class="admin-toggle" onclick="toggleAdmin()">🔧 Панел за собственика</p>

<div id="admin-panel">
  <h2>📋 Резервации</h2>

  <div class="settings-row">
    <label for="min-per-kg">Минути / кг:</label>
    <input type="number" id="min-per-kg" min="1" max="60" value="6" />
    <label for="price-per-kg">Лв. / кг:</label>
    <input type="number" id="price-per-kg" min="0.5" max="20" step="0.5" value="3" />
    <button onclick="saveSettings()" style="padding:8px 16px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.88rem">Запази</button>
    <small id="settings-saved" style="color:#16a34a;display:none">✓ Запазено</small>
  </div>

  <table id="reservations-table">
    <thead>
      <tr>
        <th>Дата</th><th>Час</th><th>Клиент</th><th>Телефон</th>
        <th>Услуги</th><th>Кг</th><th>Цена</th><th>Бележка</th>
      </tr>
    </thead>
    <tbody id="reservations-body"></tbody>
  </table>

  <button class="btn-export" onclick="exportCSV()">⬇ Изтегли CSV</button>
  <button class="btn-clear" onclick="clearAll()">🗑 Изчисти всичко</button>
</div>

<script>
// ── Settings ──────────────────────────────────────────────
function getSettings() {
  return {
    minPerKg: parseFloat(localStorage.getItem('minPerKg') || '6'),
    pricePerKg: parseFloat(localStorage.getItem('pricePerKg') || '3'),
  };
}
function saveSettings() {
  const m = parseFloat(document.getElementById('min-per-kg').value);
  const p = parseFloat(document.getElementById('price-per-kg').value);
  localStorage.setItem('minPerKg', m);
  localStorage.setItem('pricePerKg', p);
  const s = document.getElementById('settings-saved');
  s.style.display = 'inline';
  setTimeout(() => s.style.display = 'none', 2000);
  updateEstimate();
  renderSlots();
}

// ── Reservations storage ──────────────────────────────────
function getReservations() {
  return JSON.parse(localStorage.getItem('reservations') || '[]');
}
function saveReservation(r) {
  const list = getReservations();
  list.push(r);
  localStorage.setItem('reservations', JSON.stringify(list));
}

// ── Today's date string ───────────────────────────────────
function todayStr() {
  return new Date().toISOString().slice(0,10);
}

// ── Occupied slots for today ──────────────────────────────
function takenSlotsToday() {
  const today = todayStr();
  const { minPerKg } = getSettings();
  const reservations = getReservations().filter(r => r.date === today);
  // For each reservation mark every slot it occupies
  const occupied = new Set();
  reservations.forEach(r => {
    const startH = parseInt(r.slot.split(':')[0]);
    const startM = parseInt(r.slot.split(':')[1]);
    const durationMin = Math.ceil(r.weight * minPerKg);
    const totalMin = startH * 60 + startM + durationMin;
    // Mark every 30-min block within the duration
    for (let m = startH * 60 + startM; m < totalMin; m += 30) {
      const hh = String(Math.floor(m / 60)).padStart(2,'0');
      const mm = String(m % 60).padStart(2,'0');
      occupied.add(`${hh}:${mm}`);
    }
  });
  return occupied;
}

// ── Generate time slots 08:00 – 22:00 (30-min steps) ─────
function generateSlots() {
  const slots = [];
  for (let h = 8; h < 22; h++) {
    slots.push(`${String(h).padStart(2,'0')}:00`);
    slots.push(`${String(h).padStart(2,'0')}:30`);
  }
  return slots;
}

// ── Render slots ──────────────────────────────────────────
function renderSlots() {
  const grid = document.getElementById('slot-grid');
  const taken = takenSlotsToday();
  const chosen = document.getElementById('chosen-slot').value;
  grid.innerHTML = '';
  generateSlots().forEach(slot => {
    const div = document.createElement('div');
    div.className = 'slot' + (taken.has(slot) ? ' taken' : '') + (slot === chosen ? ' selected' : '');
    div.textContent = slot;
    if (taken.has(slot)) {
      div.innerHTML = `${slot}<span class="taken-label">заето</span>`;
    }
    if (!taken.has(slot)) {
      div.onclick = () => selectSlot(slot);
    }
    grid.appendChild(div);
  });
}

function selectSlot(slot) {
  document.getElementById('chosen-slot').value = slot;
  renderSlots();
}

// ── Weight → estimate ─────────────────────────────────────
function updateEstimate() {
  const kg = parseFloat(document.getElementById('weight').value);
  const box = document.getElementById('estimate-box');
  if (!kg || kg <= 0) { box.style.display = 'none'; return; }
  const { minPerKg, pricePerKg } = getSettings();
  const mins = Math.ceil(kg * minPerKg);
  const price = (kg * pricePerKg).toFixed(2);
  document.getElementById('est-time').textContent = mins >= 60
    ? `${Math.floor(mins/60)}ч ${mins%60}мин` : `~${mins} мин`;
  document.getElementById('est-price').textContent = `${price} лв.`;
  box.style.display = 'block';
}

document.getElementById('weight').addEventListener('input', updateEstimate);

// ── Form submit ───────────────────────────────────────────
document.getElementById('laundry-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const services = [...document.querySelectorAll('input[name="service"]:checked')].map(c => c.value);
  if (services.length === 0) { alert('Моля изберете поне една услуга.'); return; }
  const slot = document.getElementById('chosen-slot').value;
  if (!slot) { alert('Моля изберете час.'); return; }

  const { minPerKg, pricePerKg } = getSettings();
  const kg = parseFloat(document.getElementById('weight').value);
  const price = (kg * pricePerKg).toFixed(2);

  const reservation = {
    date: todayStr(),
    slot,
    name: document.getElementById('name').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    services: services.join(', '),
    weight: kg,
    price,
    notes: document.getElementById('notes').value.trim(),
    createdAt: new Date().toLocaleString('bg-BG'),
  };

  saveReservation(reservation);

  document.getElementById('laundry-form').style.display = 'none';
  const msg = document.getElementById('success-msg');
  msg.style.display = 'block';
  document.getElementById('success-detail').textContent =
    `${reservation.name} — ${slot} | ${services.join(', ')} | ${kg} кг | ${price} лв.`;

  renderAdmin();
});

function resetForm() {
  document.getElementById('laundry-form').reset();
  document.getElementById('chosen-slot').value = '';
  document.getElementById('estimate-box').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';
  document.getElementById('laundry-form').style.display = 'block';
  renderSlots();
}

// ── Admin panel ───────────────────────────────────────────
function toggleAdmin() {
  const p = document.getElementById('admin-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  renderAdmin();
  const s = getSettings();
  document.getElementById('min-per-kg').value = s.minPerKg;
  document.getElementById('price-per-kg').value = s.pricePerKg;
}

function renderAdmin() {
  const tbody = document.getElementById('reservations-body');
  const list = getReservations();
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="color:#9ca3af;padding:16px">Няма резервации.</td></tr>';
    return;
  }
  tbody.innerHTML = list.slice().reverse().map(r => `
    <tr>
      <td>${r.date}</td>
      <td><strong>${r.slot}</strong></td>
      <td>${r.name}</td>
      <td>${r.phone}</td>
      <td>${r.services}</td>
      <td>${r.weight} кг</td>
      <td>${r.price} лв.</td>
      <td>${r.notes || '—'}</td>
    </tr>
  `).join('');
}

function exportCSV() {
  const list = getReservations();
  if (!list.length) { alert('Няма резервации за експорт.'); return; }
  const header = 'Дата,Час,Клиент,Телефон,Услуги,Кг,Цена,Бележка\n';
  const rows = list.map(r =>
    [r.date, r.slot, r.name, r.phone, r.services, r.weight, r.price, r.notes || '']
    .map(v => `"${String(v).replace(/"/g,'""')}"`)
    .join(',')
  ).join('\n');
  const blob = new Blob(['﻿' + header + rows], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `prane-rezervacii-${todayStr()}.csv`;
  a.click();
}

function clearAll() {
  if (confirm('Сигурни ли сте? Всички резервации ще бъдат изтрити!')) {
    localStorage.removeItem('reservations');
    renderAdmin();
    renderSlots();
  }
}

// ── Init ──────────────────────────────────────────────────
renderSlots();
</script>
</body>
</html>
